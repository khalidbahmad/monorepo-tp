name: CI/CD Pipeline — Microservices

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service image
        run: |
          docker build -t user-service:${{ github.sha }} ./user-service
          docker save user-service:${{ github.sha }} | gzip > user-service.tar.gz

      - name: Build product-service image
        run: |
          docker build -t product-service:${{ github.sha }} ./product-service
          docker save product-service:${{ github.sha }} | gzip > product-service.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            user-service.tar.gz
            product-service.tar.gz

  deploy:
    name: Deploy to Lightning AI (Kind)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy images to remote
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UpdateHostKeys=no \
            user-service.tar.gz product-service.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/teamspace/studios/this_studio/

          scp -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UpdateHostKeys=no \
            -r k8s/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/teamspace/studios/this_studio/

      - name: Deploy on remote cluster
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UpdateHostKeys=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << ENDSSH
          export PATH=/teamspace/studios/this_studio/.local/bin:\$PATH
          WORKDIR="/teamspace/studios/this_studio"
          docker load < \$WORKDIR/user-service.tar.gz
          docker load < \$WORKDIR/product-service.tar.gz
          kind load docker-image user-service:${{ github.sha }} --name tp-cluster
          kind load docker-image product-service:${{ github.sha }} --name tp-cluster
          sed -i "s|user-service:.*|user-service:${{ github.sha }}|g" \$WORKDIR/k8s/user-service-deployment.yaml
          sed -i "s|product-service:.*|product-service:${{ github.sha }}|g" \$WORKDIR/k8s/product-service-deployment.yaml
          kubectl apply -f \$WORKDIR/k8s/
          kubectl rollout status deployment/user-service
          kubectl rollout status deployment/product-service
          ENDSSH
